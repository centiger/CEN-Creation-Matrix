<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>창조시대 Matrix</title>
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#071017" />
<style>
  :root{--bg:#071017;--gold:#f5d184;--paper:#f7ead0;--line:rgba(245,209,132,.32)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;width:100%;min-height:100%;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;color:#fff;overflow-x:hidden}
  body{display:flex;justify-content:center}
  .phone{position:relative;width:100%;max-width:560px;min-height:100svh;background:#071017;box-shadow:0 0 80px rgba(0,0,0,.55);overflow:hidden}
  .artwrap{position:relative;width:100%;line-height:0}
  .art{width:100%;height:auto;display:block;user-select:none;pointer-events:none}
  /* invisible click layers over the approved visual mockup */
  .hot{position:absolute;border:0;background:transparent;border-radius:18px;cursor:pointer}
  .hot:focus-visible{outline:2px solid var(--gold);background:rgba(245,209,132,.12)}
  .event{left:0;width:100%;height:13.5%}
  .e1{top:7.5%}.e2{top:22%}.e3{top:36.4%}.e4{top:50.8%}.e5{top:65.2%}.e6{top:79.7%;height:12.5%}
  .hub{left:26%;width:23%;height:4%;border-radius:12px}
  .link{left:51%;width:21%;height:4%;border-radius:12px}
  .global{left:74%;width:22%;height:4%;border-radius:12px}
  .b1{top:17.7%}.b2{top:32.4%}.b3{top:47%}.b4{top:61.5%}.b5{top:76%}
  .next{left:26%;top:88.2%;width:29%;height:4%;border-radius:18px}
  .nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:560px;height:calc(74px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);display:flex;z-index:20;background:linear-gradient(to top,rgba(3,8,12,.96),rgba(10,21,28,.88));border-top:1px solid rgba(245,209,132,.18);backdrop-filter:blur(14px)}
  .nav button{flex:1;border:0;background:transparent;color:rgba(255,255,255,.72);font-weight:800;font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .nav .active{color:var(--gold)}
  .nav i{font-style:normal;font-size:23px;line-height:1}
  .sheetBack{position:fixed;inset:0;background:rgba(0,0,0,.46);opacity:0;pointer-events:none;transition:.22s;z-index:40}
  .sheetBack.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);width:100%;max-width:560px;z-index:50;background:linear-gradient(180deg,rgba(23,31,39,.97),rgba(7,12,18,.99));border:1px solid rgba(245,209,132,.25);border-bottom:0;border-radius:24px 24px 0 0;box-shadow:0 -20px 50px rgba(0,0,0,.5);padding:18px 18px calc(24px + env(safe-area-inset-bottom));transition:.26s cubic-bezier(.2,.9,.2,1);max-height:72svh;overflow:auto}
  .sheet.show{transform:translate(-50%,0)}
  .grab{width:44px;height:5px;border-radius:999px;background:rgba(255,255,255,.25);margin:0 auto 14px}
  .sheet h2{margin:0 42px 4px 0;font-size:24px;letter-spacing:-.04em;color:#fff}
  .sheet .meta{color:var(--gold);font-weight:900;font-size:14px;margin-bottom:12px}
  .sheet p{margin:0 0 12px;color:rgba(255,255,255,.85);line-height:1.65;font-size:15px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chip{border:1px solid rgba(245,209,132,.25);background:rgba(245,209,132,.08);color:#f7e1a8;border-radius:999px;padding:8px 11px;font-size:13px;font-weight:800}
  .close{position:absolute;right:16px;top:16px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);color:#fff;font-size:22px}
  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);max-width:min(92vw,500px);background:rgba(8,13,18,.9);border:1px solid rgba(245,209,132,.3);color:#ffe6a8;padding:10px 14px;border-radius:999px;font-size:13px;font-weight:800;opacity:0;transition:.22s;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (min-width:680px){.phone{margin:18px 0;border-radius:28px}.nav{border-radius:24px 24px 0 0}.artwrap{padding-bottom:0}}
</style>
</head>
<body>
<main class="phone" aria-label="창조시대 Matrix">
  <section class="artwrap">
    <img class="art" src="./bg-approved.png" alt="창조시대 세로형 게임맵 배경" />
    <button class="hot event e1" data-type="event" data-key="creation" aria-label="창조 상세보기"></button>
    <button class="hot event e2" data-type="event" data-key="fall" aria-label="타락 상세보기"></button>
    <button class="hot event e3" data-type="event" data-key="cain" aria-label="가인과 아벨 상세보기"></button>
    <button class="hot event e4" data-type="event" data-key="flood" aria-label="노아홍수 상세보기"></button>
    <button class="hot event e5" data-type="event" data-key="babel" aria-label="바벨탑 상세보기"></button>
    <button class="hot event e6" data-type="event" data-key="abraham" aria-label="아브라함 소명 상세보기"></button>
    <button class="hot hub b1" data-type="hub" data-key="creationHub" aria-label="창조 허브"></button>
    <button class="hot link b1" data-type="connect" data-key="creation" aria-label="창조 연결탐험"></button>
    <button class="hot global b1" data-type="global" data-key="creation" aria-label="창조 통합탐험"></button>
    <button class="hot hub b2" data-type="hub" data-key="fallHub" aria-label="타락 허브"></button>
    <button class="hot link b2" data-type="connect" data-key="fall" aria-label="타락 연결탐험"></button>
    <button class="hot global b2" data-type="global" data-key="fall" aria-label="타락 통합탐험"></button>
    <button class="hot hub b3" data-type="hub" data-key="judgmentHub" aria-label="심판 허브"></button>
    <button class="hot link b3" data-type="connect" data-key="cain" aria-label="가인 연결탐험"></button>
    <button class="hot global b3" data-type="global" data-key="cain" aria-label="가인 통합탐험"></button>
    <button class="hot hub b4" data-type="hub" data-key="noahHub" aria-label="노아 허브"></button>
    <button class="hot link b4" data-type="hub" data-key="judgmentHub" aria-label="심판 허브"></button>
    <button class="hot global b4" data-type="connect" data-key="flood" aria-label="홍수 연결탐험"></button>
    <button class="hot hub b5" data-type="hub" data-key="babelHub" aria-label="바벨 허브"></button>
    <button class="hot link b5" data-type="hub" data-key="nationsHub" aria-label="열방 허브"></button>
    <button class="hot global b5" data-type="connect" data-key="babel" aria-label="바벨 연결탐험"></button>
    <button class="hot next" data-type="next" data-key="patriarch" aria-label="족장시대로"></button>
  </section>
</main>
<nav class="nav" aria-label="하단 메뉴">
  <button class="active" data-nav="matrix"><i>✦</i><span>매트릭스</span></button>
  <button data-nav="timeline"><i>◷</i><span>타임라인</span></button>
  <button data-nav="connect"><i>◎</i><span>연결 탐험</span></button>
  <button data-nav="global"><i>▣</i><span>통합 탐험</span></button>
  <button data-nav="settings"><i>⚙</i><span>설정</span></button>
</nav>
<div class="sheetBack" id="backdrop"></div>
<section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="grab"></div><button class="close" id="close" aria-label="닫기">×</button>
  <h2 id="sheetTitle">제목</h2><div class="meta" id="sheetMeta"></div><p id="sheetBody"></p><div class="chips" id="chips"></div>
</section>
<div class="toast" id="toast"></div>
<script>
const DATA={
  creation:{title:'창조',meta:'창세기 1:1',body:'하나님이 천지를 창조하시고 세상의 질서와 생명을 세우신 시작입니다. 창조는 이후 새창조와 새 예루살렘으로 이어지는 성경 전체의 출발점입니다.',chips:['천지창조','하나님의 형상','안식','새창조']},
  fall:{title:'타락',meta:'창세기 3:1-6',body:'아담과 하와가 하나님의 명령을 어기고 선악과를 먹으며 죄와 죽음이 인간 역사 안으로 들어옵니다. 에덴에서의 추방은 회복을 향한 구속사의 시작이 됩니다.',chips:['선악과','죄의 시작','추방','여자의 후손']},
  cain:{title:'가인과 아벨',meta:'창세기 4:1-8',body:'가인이 아벨을 시기하여 죽임으로 죄가 개인을 넘어 사회와 관계 안으로 확산됩니다. 심판과 긍휼이 함께 드러나는 장면입니다.',chips:['첫 살인','죄의 확산','놋 땅','심판']},
  flood:{title:'노아홍수',meta:'창세기 6:5-8:22',body:'세상의 악함에 대한 하나님의 심판이 홍수로 임하지만, 하나님은 방주를 통해 노아와 가족을 보존하십니다. 방주는 항해선이 아니라 구원을 위한 거대한 목재 구조물에 가깝습니다.',chips:['폭우','홍수 심판','방주','새 시작']},
  babel:{title:'바벨탑',meta:'창세기 11:1-9',body:'사람들이 이름을 내고 흩어짐을 면하려고 탑을 쌓지만, 하나님은 언어를 혼잡하게 하시고 민족을 흩으십니다. 이후 하나님은 한 사람 아브라함을 부르십니다.',chips:['지구라트','교만','언어 혼잡','열방 분산']},
  abraham:{title:'아브라함 소명',meta:'창세기 12:1-3',body:'바벨 이후 흩어진 열방 가운데 하나님은 아브라함을 부르시고, 그를 통해 땅의 모든 족속이 복을 얻게 하겠다고 약속하십니다. 창조시대에서 족장시대로 넘어가는 입구입니다.',chips:['다음 시대','언약','믿음의 여정','족장시대']},
  creationHub:{title:'창조 허브',meta:'창조 · 형상 · 안식',body:'창조 허브는 천지창조, 하나님의 형상, 에덴동산, 안식의 의미를 묶어 성경 전체의 시작을 보여줍니다.',chips:['창조','형상','에덴','안식']},
  fallHub:{title:'타락 허브',meta:'불순종 · 죄 · 추방',body:'타락 허브는 선악과 사건, 뱀의 유혹, 범죄, 에덴 추방을 중심으로 죄의 시작과 회복의 필요성을 탐험합니다.',chips:['선악과','유혹','죄','추방']},
  judgmentHub:{title:'심판 허브',meta:'가인 · 홍수 · 바벨',body:'심판 허브는 가인과 아벨, 노아홍수, 바벨탑을 연결하여 죄의 확산과 하나님의 공의를 보여줍니다.',chips:['가인','홍수','바벨탑','공의']},
  noahHub:{title:'노아 허브',meta:'방주 · 홍수 · 새 시작',body:'노아 허브는 홍수 심판 속에서도 하나님이 보존하시는 구원의 길과 새 시작을 보여줍니다.',chips:['방주','무지개','새 시작','언약']},
  babelHub:{title:'바벨 허브',meta:'교만 · 언어 혼잡',body:'바벨 허브는 인간이 하나님 없이 이름을 내고자 한 시도와, 그 결과로 일어난 언어 혼잡과 흩어짐을 다룹니다.',chips:['지구라트','흙벽돌','교만','흩어짐']},
  nationsHub:{title:'열방 허브',meta:'흩어짐 · 회복',body:'열방 허브는 바벨의 흩어짐에서 아브라함의 부르심, 오순절, 세계선교로 이어지는 열방 회복의 흐름을 보여줍니다.',chips:['열국표','아브라함','오순절','세계선교']},
  patriarch:{title:'족장시대로',meta:'다음 Matrix 예고',body:'다음 시대는 아브라함, 이삭, 야곱, 요셉으로 이어지는 족장시대입니다. 바벨 이후 하나님은 한 사람을 부르셔서 열방을 향한 복의 통로로 삼으십니다.',chips:['아브라함','이삭','야곱','요셉']}
};
const sheet=document.getElementById('sheet'),backdrop=document.getElementById('backdrop'),title=document.getElementById('sheetTitle'),meta=document.getElementById('sheetMeta'),body=document.getElementById('sheetBody'),chips=document.getElementById('chips'),toast=document.getElementById('toast');
function openSheet(key){const d=DATA[key]||DATA.creation;title.textContent=d.title;meta.textContent=d.meta;body.textContent=d.body;chips.innerHTML=d.chips.map(c=>`<span class="chip">${c}</span>`).join('');sheet.classList.add('show');backdrop.classList.add('show')}
function closeSheet(){sheet.classList.remove('show');backdrop.classList.remove('show')}
document.querySelectorAll('.hot').forEach(b=>b.addEventListener('click',()=>openSheet(b.dataset.key)));
document.getElementById('close').addEventListener('click',closeSheet);backdrop.addEventListener('click',closeSheet);
document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');showToast(b.textContent.trim()+' 보기');}));
function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>toast.classList.remove('show'),1200)}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
</script>
</body>
</html>
