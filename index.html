<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>창조시대 Matrix</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#070b12" />
<style>
:root{
  --bg:#070b12;--panel:rgba(8,13,23,.88);--line:rgba(255,214,128,.45);--gold:#f8d37b;--text:#fff7e6;--muted:#d9c8a9;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden} body{touch-action:pan-y;background:linear-gradient(180deg,#03060b,#0b101b 45%,#03060b)}
.app{width:100%;max-width:520px;margin:0 auto;min-height:100dvh;position:relative;background:#050914;box-shadow:0 0 50px rgba(0,0,0,.75)}
.topbar{position:sticky;top:0;z-index:30;padding:calc(8px + var(--safe-top)) 10px 8px;background:linear-gradient(180deg,rgba(3,6,11,.96),rgba(3,6,11,.72));backdrop-filter:blur(10px);border-bottom:1px solid rgba(248,211,123,.22);display:flex;align-items:center;gap:8px}
.brand{flex:1;min-width:0}.brand b{display:block;font-size:16px;letter-spacing:-.02em}.brand span{font-size:11px;color:var(--muted)}
.topbtn{border:1px solid rgba(248,211,123,.35);background:rgba(255,255,255,.06);color:var(--text);border-radius:999px;padding:7px 9px;font-size:12px;font-weight:700}
.map-wrap{position:relative;width:100%;overflow:hidden;background:#050914}.map-img{display:block;width:100%;height:auto;user-select:none;pointer-events:none}.map-overlay{position:absolute;inset:0;z-index:4}.hotspot{position:absolute;transform:translate(-50%,-50%);border:0;background:transparent;color:white;padding:0;cursor:pointer}.dot{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.38),rgba(248,211,123,.18) 32%,rgba(16,22,36,.92) 72%);border:2px solid rgba(248,211,123,.82);box-shadow:0 0 0 4px rgba(0,0,0,.34),0 0 22px rgba(248,211,123,.42);font-size:23px;position:relative}.dot::after{content:attr(data-n);position:absolute;right:-9px;top:-10px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:#b98a2e;color:#fff;font-size:13px;font-weight:900;border:2px solid #f8d37b}.dot:active{transform:scale(.94)}
.hub{min-width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:1.5px solid rgba(255,255,255,.7);background:rgba(5,9,20,.75);backdrop-filter:blur(4px);box-shadow:0 0 16px rgba(0,0,0,.55);font-size:20px}.hub::after{content:"";position:absolute;inset:-9px;border-radius:50%;border:1px dashed rgba(248,211,123,.3)}
.pulse{animation:pulse 2.2s infinite}@keyframes pulse{0%,100%{filter:drop-shadow(0 0 0 rgba(248,211,123,0))}50%{filter:drop-shadow(0 0 13px rgba(248,211,123,.95))}}
.quick{position:fixed;left:50%;bottom:calc(10px + var(--safe-bottom));transform:translateX(-50%);z-index:35;width:min(500px,calc(100% - 16px));display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:7px;background:rgba(3,6,11,.72);border:1px solid rgba(248,211,123,.24);border-radius:18px;backdrop-filter:blur(12px)}
.quick button{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#f7ead0;border-radius:13px;padding:8px 3px;font-size:11px;font-weight:800}.quick small{display:block;font-size:17px;line-height:1.1}.sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);z-index:50;width:min(520px,100%);max-height:82dvh;background:linear-gradient(180deg,rgba(15,20,32,.98),rgba(5,8,14,.99));border:1px solid rgba(248,211,123,.32);border-bottom:0;border-radius:24px 24px 0 0;box-shadow:0 -20px 70px rgba(0,0,0,.75);padding:14px 16px calc(20px + var(--safe-bottom));transition:transform .25s ease;overflow:auto}.sheet.open{transform:translate(-50%,0)}.handle{width:42px;height:4px;border-radius:99px;background:rgba(255,255,255,.28);margin:0 auto 12px}.sheet h2{margin:0 0 4px;font-size:24px;letter-spacing:-.04em}.sheet .sub{color:var(--gold);font-weight:800;margin-bottom:12px}.sheet p{line-height:1.6;color:#f4e8d2;margin:8px 0}.chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}.chip{border:1px solid rgba(248,211,123,.3);border-radius:999px;padding:6px 9px;font-size:12px;color:#f7e6bd;background:rgba(248,211,123,.07)}.links{display:grid;gap:8px;margin-top:12px}.linkcard{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);border-radius:14px;padding:10px 12px}.close{position:absolute;right:14px;top:14px;border:0;border-radius:50%;width:34px;height:34px;background:rgba(255,255,255,.09);color:#fff;font-size:20px}.dim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:45;display:none}.dim.show{display:block}.hint{position:absolute;left:50%;top:9.4%;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.18);border-radius:999px;color:#fff0c8;font-size:11px;font-weight:800;padding:6px 10px;backdrop-filter:blur(5px);white-space:nowrap}
.footer-space{height:74px}.toast{position:fixed;left:50%;top:calc(54px + var(--safe-top));transform:translateX(-50%);z-index:60;background:rgba(12,18,28,.92);border:1px solid rgba(248,211,123,.35);border-radius:999px;padding:8px 12px;color:#ffe8ac;font-size:12px;font-weight:800;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}.legend{padding:14px 16px 90px;background:#050914}.legend h3{margin:6px 0 10px;font-size:18px}.legend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.legend-card{border:1px solid rgba(248,211,123,.18);background:rgba(255,255,255,.05);border-radius:14px;padding:10px}.legend-card b{display:block;color:#ffe0a0;margin-bottom:4px}.legend-card span{font-size:12px;color:#d9c8a9;line-height:1.45}
@media (min-width:521px){.app{border-left:1px solid rgba(248,211,123,.15);border-right:1px solid rgba(248,211,123,.15)}.dot{width:62px;height:62px}.quick{bottom:16px}.sheet{bottom:0}}
@media (max-width:380px){.dot{width:48px;height:48px;font-size:20px}.dot::after{width:21px;height:21px;font-size:12px}.topbtn{font-size:11px;padding:6px 7px}.quick button{font-size:10px}.quick small{font-size:15px}.sheet h2{font-size:22px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><b>창조시대 Matrix</b><span>창조에서 바벨탑, 그리고 아브라함 소명까지</span></div>
    <button class="topbtn" onclick="openPanel('overview')">개요</button>
    <button class="topbtn" onclick="scrollToTop()">처음</button>
  </header>
  <main class="map-wrap" id="map">
    <img class="map-img" src="assets/creation-bg.png" alt="창조시대 세로형 매트릭스 배경" />
    <div class="hint">도트와 허브를 터치하세요</div>
    <div class="map-overlay">
      <button class="hotspot" style="left:15%;top:8.8%" onclick="openPanel('creation')"><span class="dot pulse" data-n="1">✦</span></button>
      <button class="hotspot" style="left:15%;top:24.6%" onclick="openPanel('fall')"><span class="dot" data-n="2">🌳</span></button>
      <button class="hotspot" style="left:15%;top:40.2%" onclick="openPanel('cain')"><span class="dot" data-n="3">⚔️</span></button>
      <button class="hotspot" style="left:15%;top:56.3%" onclick="openPanel('flood')"><span class="dot" data-n="4">🌧️</span></button>
      <button class="hotspot" style="left:15%;top:72.1%" onclick="openPanel('babel')"><span class="dot" data-n="5">🧱</span></button>
      <button class="hotspot" style="left:15%;top:88.6%" onclick="openPanel('abraham')"><span class="dot pulse" data-n="6">★</span></button>
      <button class="hotspot" style="left:82%;top:17.5%" onclick="openPanel('hub-creation')"><span class="hub">✨</span></button>
      <button class="hotspot" style="left:82%;top:30.5%" onclick="openPanel('hub-fall')"><span class="hub">🍎</span></button>
      <button class="hotspot" style="left:82%;top:56.3%" onclick="openPanel('hub-judgment')"><span class="hub">⚖️</span></button>
      <button class="hotspot" style="left:82%;top:64.4%" onclick="openPanel('hub-covenant')"><span class="hub">🌈</span></button>
      <button class="hotspot" style="left:82%;top:77.8%" onclick="openPanel('hub-nations')"><span class="hub">🌍</span></button>
    </div>
  </main>
  <section class="legend">
    <h3>허브 바로가기</h3>
    <div class="legend-grid">
      <button class="legend-card" onclick="openPanel('hub-creation')"><b>✨ 창조 허브</b><span>창조, 형상, 안식, 새창조</span></button>
      <button class="legend-card" onclick="openPanel('hub-fall')"><b>🍎 타락 허브</b><span>죄의 시작과 에덴 추방</span></button>
      <button class="legend-card" onclick="openPanel('hub-judgment')"><b>⚖️ 심판 허브</b><span>가인, 홍수, 바벨탑</span></button>
      <button class="legend-card" onclick="openPanel('hub-covenant')"><b>🌈 언약 허브</b><span>여자의 후손, 방주, 무지개</span></button>
      <button class="legend-card" onclick="openPanel('hub-nations')"><b>🌍 열방 허브</b><span>바벨탑, 언어 혼잡, 열방 분산</span></button>
      <button class="legend-card" onclick="openPanel('explore')"><b>🔗 연결탐험</b><span>성막, 십자가, 오순절, 새예루살렘</span></button>
    </div>
  </section>
</div>
<nav class="quick">
  <button onclick="openPanel('hub-creation')"><small>✨</small>창조</button>
  <button onclick="openPanel('hub-fall')"><small>🍎</small>타락</button>
  <button onclick="openPanel('hub-judgment')"><small>⚖️</small>심판</button>
  <button onclick="openPanel('hub-covenant')"><small>🌈</small>언약</button>
  <button onclick="openPanel('hub-nations')"><small>🌍</small>열방</button>
</nav>
<div class="dim" id="dim" onclick="closePanel()"></div>
<section class="sheet" id="sheet" aria-live="polite"><button class="close" onclick="closePanel()">×</button><div class="handle"></div><div id="content"></div></section>
<div class="toast" id="toast">선택됨</div>
<script>
const DATA={
overview:{title:'창조시대 개요',sub:'창세기 1:1 ~ 11:9',body:['창조시대는 성경 전체 이야기의 출발점입니다. 흐름은 창조 → 타락 → 죄의 확산 → 홍수 심판 → 바벨탑 → 아브라함 소명으로 이어집니다.','이 매트릭스는 지도라기보다 세로형 구속사 스토리보드입니다. 아래로 내려가며 사건을 따라가고, 각 도트와 허브를 터치해 상세 내용을 봅니다.'],chips:['창조','타락','심판','언약','열방'],links:['창조에서 새창조로 이어지는 큰 흐름','바벨탑 이후 아브라함 소명으로 연결']},
creation:{title:'창조',sub:'창 1:1',body:['하나님이 천지를 창조하시고 인간을 하나님의 형상으로 지으신 사건입니다.','성경 전체의 출발점이며, 마지막 새하늘과 새땅으로 이어지는 큰 주제의 시작입니다.'],chips:['천지창조','하나님의 형상','안식일'],links:['창조 → 새창조 → 새예루살렘','에덴 → 성막 → 성전 → 하나님의 임재']},
fall:{title:'타락',sub:'창 3:1-6',body:['아담과 하와가 하나님의 명령을 어기고 선악과를 먹은 사건입니다.','죄가 인간 세계에 들어오고, 에덴에서의 추방과 관계의 깨어짐이 시작됩니다.'],chips:['선악과','유혹','추방','죄의 시작'],links:['타락 → 십자가 → 회복','에덴 추방 → 하나님의 임재 회복']},
cain:{title:'가인과 아벨',sub:'창 4:1-8',body:['가인이 아벨을 시기하여 죽인 사건입니다.','타락 이후 죄가 개인과 가족, 사회로 확산되는 모습을 보여줍니다.'],chips:['첫 살인','시기','죄의 확산'],links:['가인 → 죄의 확산 → 홍수 심판','피 흘림 → 속죄의 필요']},
flood:{title:'노아홍수',sub:'창 6:5-8:22',body:['세상의 악함이 가득하자 하나님이 홍수로 심판하신 사건입니다.','방주는 항해용 선박이라기보다 하나님이 준비하신 거대한 구원의 상자에 가깝습니다.'],chips:['폭우','심판의 물','방주','새로운 시작'],links:['방주 → 구원 → 세례','무지개 → 언약 → 은혜']},
babel:{title:'바벨탑',sub:'창 11:1-9',body:['사람들이 하늘에 닿는 이름을 내고자 탑을 쌓은 사건입니다.','뾰족한 탑보다는 메소포타미아식 계단형 지구라트에 가까운 이미지가 적절합니다.'],chips:['지구라트','교만','언어 혼잡','열방 분산'],links:['바벨탑 → 오순절 → 열방 선교','흩어짐 → 아브라함 소명']},
abraham:{title:'아브라함 소명',sub:'창 12:1-3',body:['바벨탑 이후 흩어진 열방 가운데 하나님이 한 사람 아브라함을 부르십니다.','창조시대의 끝이자 족장시대로 넘어가는 연결문입니다.'],chips:['다음 시대','언약','복의 통로'],links:['아브라함 → 이스라엘 → 메시아','열방 분산 → 열방의 복']},
'hub-creation':{title:'창조 허브',sub:'창조 · 형상 · 안식 · 새창조',body:['하나님이 세상을 질서 있게 창조하시고, 인간에게 하나님의 형상과 사명을 주신 흐름을 탐험합니다.'],chips:['빛','에덴','형상','안식'],links:['창조 → 안식일','에덴동산 → 새예루살렘','생명나무 → 생명수 강']},
'hub-fall':{title:'타락 허브',sub:'선악과 · 불순종 · 추방',body:['죄가 어떻게 시작되고 인간과 하나님, 인간과 인간, 인간과 창조세계의 관계가 어떻게 무너지는지 보여줍니다.'],chips:['선악과','뱀','가죽옷','추방'],links:['가죽옷 → 속죄','여자의 후손 → 메시아 약속']},
'hub-judgment':{title:'심판 허브',sub:'가인 · 홍수 · 바벨',body:['죄가 확산될 때 하나님의 공의가 어떻게 드러나는지 보여주는 허브입니다.'],chips:['첫 살인','홍수','언어 혼잡'],links:['홍수 심판 → 새 시작','바벨 심판 → 열방 분산']},
'hub-covenant':{title:'언약 허브',sub:'여자의 후손 · 방주 · 무지개',body:['심판 속에서도 하나님이 구원의 약속을 끊지 않으시는 흐름을 보여줍니다.'],chips:['여자의 후손','방주','무지개','은혜'],links:['무지개 언약 → 아브라함 언약','방주 → 구원 → 세례']},
'hub-nations':{title:'열방 허브',sub:'바벨탑 · 언어 혼잡 · 열방 분산',body:['인간의 교만으로 흩어진 열방이 결국 아브라함, 오순절, 세계선교로 다시 연결되는 흐름을 보여줍니다.'],chips:['열국표','시날평지','언어 혼잡','세계선교'],links:['바벨탑 → 오순절','아브라함 → 땅의 모든 족속','열방 → 새하늘과 새땅']},
explore:{title:'연결탐험',sub:'창조시대에서 성경 전체로',body:['창조시대의 사건들은 이후 성경 전체의 씨앗이 됩니다. 각 사건은 후대의 언약, 성막, 십자가, 오순절, 새예루살렘으로 이어집니다.'],chips:['새창조','성막','십자가','오순절','새예루살렘'],links:['창조 → 새창조 → 새예루살렘','에덴 → 성막 → 성전 → 하나님의 임재','노아방주 → 구원 → 세례','바벨탑 → 오순절 → 열방 선교']}
};
const sheet=document.getElementById('sheet'), dim=document.getElementById('dim'), content=document.getElementById('content'), toast=document.getElementById('toast');
function openPanel(key){const d=DATA[key]||DATA.overview;content.innerHTML=`<h2>${d.title}</h2><div class="sub">${d.sub}</div>${d.body.map(p=>`<p>${p}</p>`).join('')}<div class="chips">${d.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div><div class="links">${d.links.map(l=>`<div class="linkcard">🔗 ${l}</div>`).join('')}</div>`;sheet.classList.add('open');dim.classList.add('show');showToast(d.title)}
function closePanel(){sheet.classList.remove('open');dim.classList.remove('show')}
function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(window.__to);window.__to=setTimeout(()=>toast.classList.remove('show'),900)}
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'})}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));}
</script>
</body>
</html>
