<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#1f3527" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>창조시대 Matrix</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root{--bg:#102118;--panel:#fff9ea;--ink:#2d2118;--gold:#d9b56b;--green:#38624a;--line:rgba(255,255,255,.32)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;color:var(--ink);overflow-x:hidden}
    body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
    .app{width:100%;max-width:520px;margin:0 auto;background:#13261b;min-height:100vh;position:relative;box-shadow:0 0 40px rgba(0,0,0,.35)}
    header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,rgba(16,33,24,.96),rgba(16,33,24,.82));backdrop-filter:blur(10px);color:#fff;padding:12px 14px 10px;border-bottom:1px solid rgba(255,255,255,.12)}
    header h1{margin:0;font-size:20px;letter-spacing:-.04em}.sub{font-size:12px;opacity:.82;margin-top:3px}.topBtns{display:flex;gap:7px;margin-top:9px;overflow-x:auto;padding-bottom:2px}.topBtns button{white-space:nowrap;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.1);color:#fff;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:700}
    .scrollmap{position:relative;width:100%;min-height:2050px;overflow:hidden;background:linear-gradient(180deg,#132241 0%,#284c72 9%,#5da276 22%,#3f734f 35%,#6a5737 49%,#34445d 66%,#9b7a4c 82%,#c28f50 100%)}
    .scrollmap:before{content:"";position:absolute;inset:0;background:
      radial-gradient(circle at 50% 7%,rgba(255,245,174,.85),transparent 15%),
      radial-gradient(circle at 50% 24%,rgba(119,214,139,.55),transparent 20%),
      radial-gradient(circle at 46% 57%,rgba(43,77,99,.7),transparent 22%),
      radial-gradient(circle at 58% 84%,rgba(99,56,28,.55),transparent 22%);opacity:.95}
    .sectionLabel{position:absolute;left:50%;transform:translateX(-50%);padding:7px 13px;border-radius:999px;background:rgba(20,32,24,.76);color:#fff;font-size:12px;font-weight:800;border:1px solid rgba(255,255,255,.26);z-index:4;white-space:nowrap}
    .landmark{position:absolute;left:50%;transform:translateX(-50%);text-align:center;z-index:2;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);font-weight:900;letter-spacing:-.04em}.landmark .emoji{font-size:54px;display:block;margin-bottom:2px}.landmark small{display:block;font-size:12px;font-weight:700;opacity:.9}
    .river{position:absolute;left:49%;top:382px;width:3px;height:310px;background:linear-gradient(180deg,rgba(173,228,255,.8),rgba(173,228,255,.05));box-shadow:-45px 70px 0 rgba(173,228,255,.25),45px 86px 0 rgba(173,228,255,.2);border-radius:999px;z-index:1}.path{position:absolute;left:50%;top:126px;width:4px;height:1790px;transform:translateX(-50%);background:linear-gradient(180deg,transparent,var(--line) 4%,var(--line) 96%,transparent);z-index:3}.path:after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0 46px,rgba(255,255,255,.55) 47px 55px,transparent 56px 100px)}
    .node,.hub{position:absolute;z-index:8;transform:translate(-50%,-50%);border:none;cursor:pointer}.node{width:82px;min-height:82px;border-radius:24px;background:linear-gradient(180deg,#fff7de,#f2d188);box-shadow:0 10px 22px rgba(0,0,0,.28),inset 0 0 0 2px rgba(116,75,29,.2);padding:7px 5px;color:#362312;font-weight:900}.node .num{display:inline-flex;width:22px;height:22px;border-radius:50%;background:#55351c;color:#fff;align-items:center;justify-content:center;font-size:12px}.node .ico{display:block;font-size:25px;line-height:1.05;margin:2px 0}.node .txt{display:block;font-size:12px;line-height:1.12;letter-spacing:-.05em}.hub{width:68px;height:68px;border-radius:21px;background:rgba(23,54,38,.92);color:#fff;border:2px solid rgba(236,210,139,.9);box-shadow:0 8px 18px rgba(0,0,0,.3);font-size:12px;font-weight:900;letter-spacing:-.06em}.hub .ico{display:block;font-size:22px}.hub .txt{display:block;line-height:1.05}.next{position:absolute;left:50%;bottom:34px;transform:translateX(-50%);z-index:8;width:86%;border:1px solid rgba(255,255,255,.32);background:rgba(255,249,229,.92);border-radius:22px;padding:14px 15px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,.25)}.next b{display:block;font-size:17px}.next span{font-size:12px;color:#5b402a}
    .ark{position:absolute;left:48%;top:1280px;transform:translateX(-50%);z-index:2;width:172px;height:72px;border-radius:10px 10px 7px 7px;background:linear-gradient(180deg,#7c512e,#4b2f1c);box-shadow:0 12px 24px rgba(0,0,0,.32);border:4px solid rgba(45,25,12,.55)}.ark:before{content:"";position:absolute;left:18px;right:18px;top:-30px;height:34px;background:#5b3820;border-radius:8px 8px 0 0;border:3px solid rgba(45,25,12,.5)}.ark:after{content:"";position:absolute;left:12px;right:12px;top:28px;height:4px;background:rgba(255,255,255,.18);box-shadow:0 -17px 0 rgba(255,255,255,.14)}
    .mountain{position:absolute;left:55%;top:1405px;transform:translateX(-50%);z-index:1;width:250px;height:120px;background:linear-gradient(135deg,#384957,#9aa7ad);clip-path:polygon(0 100%,35% 25%,48% 55%,67% 0,100% 100%);opacity:.92}.tower{position:absolute;left:56%;top:1690px;transform:translateX(-50%);z-index:2;width:135px;height:178px;background:linear-gradient(180deg,#b98346,#70401f);clip-path:polygon(33% 0,80% 13%,70% 100%,10% 100%,18% 25%);box-shadow:0 12px 24px rgba(0,0,0,.25)}.tower:after{content:"";position:absolute;inset:18px 13px;background:repeating-linear-gradient(180deg,rgba(255,255,255,.18) 0 8px,transparent 9px 20px)}
    .sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);width:100%;max-width:520px;max-height:82vh;z-index:60;background:var(--panel);border-radius:24px 24px 0 0;box-shadow:0 -20px 45px rgba(0,0,0,.42);transition:.25s ease;padding:18px 16px 22px;overflow:auto}.sheet.open{transform:translate(-50%,0)}.sheet h2{margin:0 36px 8px 0;font-size:21px;letter-spacing:-.06em}.sheet .close{position:absolute;right:14px;top:12px;border:0;background:#3b2a1b;color:#fff;border-radius:50%;width:34px;height:34px;font-size:20px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}.chip{background:#ead8ad;border:1px solid #d2b26d;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.card{background:#fffdf5;border:1px solid #ead8ad;border-radius:16px;padding:12px;margin:9px 0}.card b{display:block;margin-bottom:5px;color:#51371f}.card p{margin:0;font-size:14px;line-height:1.55}.memo{width:100%;min-height:100px;border:1px solid #d8c391;border-radius:14px;padding:10px;font:inherit;background:#fff}.smallBtn{border:none;background:#2f5a40;color:#fff;border-radius:12px;padding:9px 12px;font-weight:900}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:50;display:none}.overlay.on{display:block}
    @media (min-width:700px){.app{max-width:560px}.scrollmap{min-height:2200px}.node{width:88px;height:88px}.hub{width:72px;height:72px}}
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>창조시대 Matrix</h1>
      <div class="sub">창조 → 타락 → 심판 → 언약 → 열방분산 → 아브라함 소명</div>
      <div class="topBtns">
        <button onclick="openSheet('overview')">시대개요</button><button onclick="openSheet('timeline')">연대표</button><button onclick="openSheet('explore')">연결탐험</button><button onclick="openSheet('memo')">메모</button>
      </div>
    </header>
    <section class="scrollmap" aria-label="창조시대 세로형 매트릭스">
      <div class="path"></div><div class="river"></div><div class="ark"></div><div class="mountain"></div><div class="tower"></div>
      <div class="sectionLabel" style="top:88px">1. 창조의 빛</div><div class="landmark" style="top:145px"><span class="emoji">☀️</span>천지창조<small>하나님이 보시기에 좋았더라</small></div>
      <button class="node" style="left:50%;top:260px" onclick="openSheet('event1')"><span class="num">1</span><span class="ico">🌌</span><span class="txt">창조</span></button>
      <button class="hub" style="left:18%;top:315px" onclick="openSheet('hubCreation')"><span class="ico">🌟</span><span class="txt">창조<br>허브</span></button>
      <div class="sectionLabel" style="top:405px">2. 에덴과 타락</div><div class="landmark" style="top:495px"><span class="emoji">🌳</span>에덴동산<small>생명나무와 선악과</small></div>
      <button class="node" style="left:54%;top:650px" onclick="openSheet('event2')"><span class="num">2</span><span class="ico">🍎</span><span class="txt">타락</span></button>
      <button class="hub" style="left:82%;top:610px" onclick="openSheet('hubFall')"><span class="ico">🍎</span><span class="txt">타락<br>허브</span></button>
      <div class="sectionLabel" style="top:790px">3. 죄의 확산</div><div class="landmark" style="top:865px"><span class="emoji">🚪</span>에덴 동쪽<small>추방 이후의 땅</small></div>
      <button class="node" style="left:46%;top:1000px" onclick="openSheet('event3')"><span class="num">3</span><span class="ico">⚔️</span><span class="txt">가인과<br>아벨</span></button>
      <button class="hub" style="left:19%;top:1045px" onclick="openSheet('hubJudgment')"><span class="ico">⚖️</span><span class="txt">심판<br>허브</span></button>
      <div class="sectionLabel" style="top:1180px">4. 홍수와 새 시작</div>
      <button class="node" style="left:50%;top:1215px" onclick="openSheet('event4')"><span class="num">4</span><span class="ico">🌧️</span><span class="txt">노아<br>홍수</span></button>
      <button class="hub" style="left:82%;top:1360px" onclick="openSheet('hubCovenant')"><span class="ico">🌈</span><span class="txt">언약<br>허브</span></button>
      <div class="landmark" style="top:1508px"><span class="emoji">⛰️</span>아라랏산<small>방주가 머문 곳</small></div>
      <div class="sectionLabel" style="top:1625px">5. 바벨과 열방분산</div>
      <button class="node" style="left:48%;top:1740px" onclick="openSheet('event5')"><span class="num">5</span><span class="ico">🗼</span><span class="txt">바벨탑</span></button>
      <button class="hub" style="left:19%;top:1795px" onclick="openSheet('hubNations')"><span class="ico">🌍</span><span class="txt">열방<br>허브</span></button>
      <div class="next" onclick="openSheet('next')"><b>⭐ 다음 시대 예고: 아브라함 소명</b><span>바벨의 흩어짐 이후, 하나님은 한 사람을 부르셔서 열방을 향한 복의 통로를 여십니다.</span></div>
    </section>
  </main>
  <div class="overlay" id="overlay" onclick="closeSheet()"></div><section class="sheet" id="sheet"><button class="close" onclick="closeSheet()">×</button><div id="sheetContent"></div></section>
<script>
const data={
 overview:{t:'창조시대 개요',chips:['창세기 1~11장','프롤로그','상징지도'],cards:[['핵심 흐름','창조에서 시작한 세계가 타락과 죄의 확산, 홍수 심판, 바벨의 흩어짐을 거쳐 아브라함 소명으로 이어집니다.'],['화면 원칙','핸드폰 세로 화면에 맞춘 두루마리형 매트릭스입니다. 좌표는 % 기반이라 화면 폭이 달라도 넘치지 않도록 설계했습니다.']]},
 timeline:{t:'연대표',chips:['창조','타락','홍수','바벨'],cards:[['1 창조','하나님이 천지를 창조하시고 인간을 하나님의 형상으로 지으심.'],['2 타락','선악과 사건으로 죄와 죽음이 인간 역사에 들어옴.'],['3 죄의 확산','가인과 아벨 사건을 통해 죄가 인간 관계로 번짐.'],['4 노아홍수','죄악이 가득한 세상을 심판하시고 방주를 통해 남은 자를 보존하심.'],['5 바벨탑','인간의 교만과 자기 이름 추구를 흩으시고 열방이 분산됨.']]},
 explore:{t:'연결탐험',chips:['새창조','성막·성전','십자가','오순절'],cards:[['창조 → 새창조','첫 창조는 요한계시록의 새 하늘과 새 땅으로 완성됩니다.'],['에덴 → 성막·성전','에덴의 임재 공간은 성막과 성전을 거쳐 새 예루살렘으로 확장됩니다.'],['방주 → 구원','노아의 방주는 심판 가운데 보존하시는 구원의 상징으로 읽을 수 있습니다.'],['바벨 → 오순절','바벨에서 언어가 흩어지고, 오순절에는 복음 안에서 열방이 다시 연결됩니다.']]},
 event1:{t:'① 창조',chips:['창 1~2장','하나님의 형상','안식'],cards:[['사건요약','하나님이 말씀으로 천지를 창조하시고 인간을 하나님의 형상으로 지으셨습니다.'],['핵심의미','성경 전체의 출발점입니다. 세계는 우연이 아니라 하나님의 질서와 선하심 안에서 시작됩니다.']]},
 event2:{t:'② 타락',chips:['창 3장','선악과','추방'],cards:[['사건요약','아담과 하와가 하나님의 명령을 어기고 선악과를 먹어 죄가 들어옵니다.'],['핵심의미','인간의 문제는 단순한 실수가 아니라 하나님과의 관계 단절에서 시작됩니다.']]},
 event3:{t:'③ 가인과 아벨',chips:['창 4장','첫 살인','죄의 확산'],cards:[['사건요약','가인이 아벨을 죽이면서 죄가 예배와 가족 관계 안으로 확산됩니다.'],['핵심의미','타락은 개인의 내면에 머물지 않고 공동체와 역사 전체를 무너뜨립니다.']]},
 event4:{t:'④ 노아홍수',chips:['창 6~9장','방주','무지개 언약'],cards:[['사건요약','하나님은 죄악이 가득한 세상을 홍수로 심판하시고, 노아의 방주를 통해 생명을 보존하십니다.'],['핵심의미','방주는 항해용 배가 아니라 심판 가운데 보존하시는 구원의 상징입니다.']]},
 event5:{t:'⑤ 바벨탑',chips:['창 11장','시날평지','열방분산'],cards:[['사건요약','사람들이 자기 이름을 내기 위해 탑을 쌓자 하나님이 언어를 혼잡하게 하시고 흩으십니다.'],['핵심의미','바벨은 인간 중심 문명의 한계를 보여주며, 이후 아브라함 소명의 배경이 됩니다.']]},
 hubCreation:{t:'창조 허브',chips:['창조','형상','안식','에덴'],cards:[['핵심 장면','빛, 궁창, 땅과 바다, 생명, 인간 창조, 안식.'],['연결','새창조, 새예루살렘, 하나님의 나라로 이어집니다.']]},
 hubFall:{t:'타락 허브',chips:['유혹','죄','저주','추방'],cards:[['핵심 장면','뱀의 유혹, 선악과, 범죄, 가죽옷, 에덴 추방.'],['연결','십자가, 속죄, 구원, 회복의 주제로 이어집니다.']]},
 hubJudgment:{t:'심판 허브',chips:['가인','홍수','바벨'],cards:[['핵심 장면','첫 살인, 죄악의 관영, 홍수 심판, 언어 혼잡.'],['연결','출애굽 재앙, 이스라엘 멸망, 최후심판과 연결됩니다.']]},
 hubCovenant:{t:'언약 허브',chips:['여자의 후손','가죽옷','무지개'],cards:[['핵심 장면','심판 가운데 약속과 보존이 함께 나타납니다.'],['연결','아브라함 언약, 시내산 언약, 다윗 언약, 새언약으로 이어집니다.']]},
 hubNations:{t:'열방 허브',chips:['열국표','바벨','오순절'],cards:[['핵심 장면','노아 후손의 열국표, 바벨탑, 민족과 언어의 분산.'],['연결','아브라함 소명, 오순절, 세계선교, 새 하늘과 새 땅의 열방 회복으로 이어집니다.']]},
 next:{t:'다음 시대: 족장시대',chips:['아브라함','언약','열방의 복'],cards:[['왜 아브라함인가','바벨에서 흩어진 열방을 향해 하나님은 아브라함을 부르시고, 그를 통해 모든 민족이 복을 받게 하겠다고 약속하십니다.']]},
 memo:{t:'나의 메모',chips:['로컬 저장'],cards:[]}
};
function openSheet(key){const x=data[key]||data.overview;let html=`<h2>${x.t}</h2><div class="chips">${(x.chips||[]).map(c=>`<span class="chip">${c}</span>`).join('')}</div>`; if(key==='memo'){html+=`<textarea id="memoBox" class="memo" placeholder="창조시대 메모를 적어두세요.">${localStorage.getItem('creationMemo')||''}</textarea><p><button class="smallBtn" onclick="saveMemo()">저장</button></p>`}else{html+=(x.cards||[]).map(c=>`<div class="card"><b>${c[0]}</b><p>${c[1]}</p></div>`).join('')}document.getElementById('sheetContent').innerHTML=html;document.getElementById('overlay').classList.add('on');document.getElementById('sheet').classList.add('open');history.pushState({sheet:key},'')}
function closeSheet(){document.getElementById('overlay').classList.remove('on');document.getElementById('sheet').classList.remove('open')}
function saveMemo(){localStorage.setItem('creationMemo',document.getElementById('memoBox').value);alert('저장했습니다.')}
window.addEventListener('popstate',()=>closeSheet());
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
</body>
</html>
